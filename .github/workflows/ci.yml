name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build SSH test container
        run: docker build -t pi-tramp-ssh-test test/fixtures/ssh-server/

      - name: Start SSH test container
        run: docker run -d --name pi-tramp-ssh-test -p 2222:22 pi-tramp-ssh-test

      - name: Wait for SSH
        run: |
          for i in $(seq 1 10); do
            ssh-keyscan -p 2222 localhost >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run integration tests
        run: npm run test:integration

      - name: Cleanup
        if: always()
        run: docker rm -f pi-tramp-ssh-test || true

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm audit --audit-level=critical
