name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # Integration tests — Linux containers (ubuntu runner)
  # Tests: Docker×bash, Docker×pwsh, SSH×bash, SSH×pwsh against Linux container
  # ---------------------------------------------------------------------------
  test-integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build Linux test container
        run: docker build -t pi-tramp-ssh-test test/fixtures/ssh-server/

      - name: Start SSH container
        run: docker run -d --name pi-tramp-ssh-test -p 2222:22 pi-tramp-ssh-test

      - name: Wait for SSH
        run: |
          for i in $(seq 1 10); do
            ssh-keyscan -p 2222 localhost >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run integration tests
        run: npm run test:integration

      - name: Cleanup
        if: always()
        run: docker rm -f pi-tramp-ssh-test pi-tramp-e2e-docker 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Integration tests — Windows containers (windows runner)
  # Tests: Docker×bash, Docker×pwsh, SSH×bash, SSH×pwsh against Windows container
  # ---------------------------------------------------------------------------
  test-integration-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build Windows test container
        run: docker build -t pi-tramp-win-test test/fixtures/windows-ssh-server/

      - name: Start SSH container
        run: docker run -d --name pi-tramp-win-test -p 2222:22 pi-tramp-win-test

      - name: Wait for SSH
        shell: pwsh
        run: |
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $null = Test-NetConnection -ComputerName localhost -Port 2222 -ErrorAction Stop
              Write-Host "SSH ready"
              break
            } catch { Start-Sleep 2 }
          }

      - name: Run integration tests
        env:
          PI_TRAMP_TARGET_OS: windows
        run: npm run test:integration

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          docker rm -f pi-tramp-win-test 2>$null
          docker rm -f pi-tramp-e2e-win-docker 2>$null

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm audit --audit-level=critical
