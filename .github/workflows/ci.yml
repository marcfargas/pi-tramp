name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # Integration tests — Linux containers (ubuntu runner)
  # Tests: Docker×bash, Docker×pwsh, SSH×bash, SSH×pwsh against Linux container
  # ---------------------------------------------------------------------------
  test-integration-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Compute Dockerfile hash
        id: df-hash
        run: echo "hash=$(sha256sum test/fixtures/ssh-server/Dockerfile | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build Linux test container
        env:
          CAN_PUSH: ${{ github.event_name != 'pull_request' }}
        run: |
          owner="${{ github.repository_owner }}"
          image="ghcr.io/${owner,,}/pi-tramp-ssh-test"
          tag="${{ steps.df-hash.outputs.hash }}"
          fullTag="${image}:${tag}"

          # Try to pull cached image
          if docker pull "$fullTag" 2>/dev/null; then
            echo "✅ Using cached image: $fullTag"
            docker tag "$fullTag" pi-tramp-ssh-test
          else
            echo "🔨 Cache miss — building from scratch"
            docker build -t pi-tramp-ssh-test test/fixtures/ssh-server/
            if [ "$CAN_PUSH" = "true" ]; then
              docker tag pi-tramp-ssh-test "$fullTag"
              docker push "$fullTag"
              docker tag pi-tramp-ssh-test "${image}:latest"
              docker push "${image}:latest"
            fi
          fi

      - name: Start SSH container
        run: docker run -d --name pi-tramp-ssh-test -p 2222:22 pi-tramp-ssh-test

      - name: Wait for SSH
        run: |
          for i in $(seq 1 10); do
            ssh-keyscan -p 2222 localhost >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run integration tests
        run: npm run test:integration

      - name: Cleanup
        if: always()
        run: docker rm -f pi-tramp-ssh-test pi-tramp-e2e-docker 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Integration tests — Windows containers (windows runner)
  # Tests: Docker×bash, Docker×pwsh, SSH×bash, SSH×pwsh against Windows container
  # ---------------------------------------------------------------------------
  test-integration-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Compute Dockerfile hash
        id: df-hash
        shell: bash
        run: echo "hash=$(sha256sum test/fixtures/windows-ssh-server/Dockerfile | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build Windows test container
        shell: pwsh
        env:
          CAN_PUSH: ${{ github.event_name != 'pull_request' }}
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $image = "ghcr.io/${owner}/pi-tramp-win-test"
          $tag = "${{ steps.df-hash.outputs.hash }}"
          $fullTag = "${image}:${tag}"

          # Try to pull cached image
          docker pull $fullTag 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ Using cached image: $fullTag"
            docker tag $fullTag pi-tramp-win-test
          } else {
            Write-Host "🔨 Cache miss — building from scratch"
            docker build -t pi-tramp-win-test test/fixtures/windows-ssh-server/
            if ($env:CAN_PUSH -eq "true") {
              docker tag pi-tramp-win-test $fullTag
              docker push $fullTag
              docker tag pi-tramp-win-test "${image}:latest"
              docker push "${image}:latest"
            }
          }

      - name: Start SSH container
        shell: pwsh
        run: |
          docker run -d --name pi-tramp-win-test -p 2222:22 pi-tramp-win-test

      - name: Wait for SSH
        shell: pwsh
        run: |
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $null = Test-NetConnection -ComputerName localhost -Port 2222 -ErrorAction Stop
              Write-Host "SSH ready on port 2222"
              break
            } catch { Start-Sleep 2 }
          }

      - name: Run integration tests
        env:
          PI_TRAMP_TARGET_OS: windows
        run: npm run test:integration

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          docker rm -f pi-tramp-win-test 2>$null
          docker rm -f pi-tramp-e2e-win-docker 2>$null

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm audit --audit-level=critical
